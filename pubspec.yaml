name: academic_assessment_system_app
description: A local storage based academic assessment system
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # REQUIRED DEPENDENCIES
  shared_preferences: ^2.2.2
  web_socket_channel: ^2.4.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  cloud_firestore: ^5.4.4
  firebase_core: ^3.8.0

  

  # Flutter’s material UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/student_page.html
